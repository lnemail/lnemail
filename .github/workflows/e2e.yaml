name: e2e

# The full e2e suite drives a complete docker compose stack
# (bitcoind regtest, two LND nodes, docker-mailserver, the API and
# its workers, ...) and pays real Lightning invoices. It works
# reliably on a developer laptop but is too slow / flaky on the
# default GitHub-hosted runners: bitcoind needs to mine ~150 blocks
# to fund LND, the LND <-> router channel has to open and become
# active, and docker-mailserver shuts down if no mail account is
# created within ~120s of boot. In practice all three timers fight
# each other on a 2-CPU runner.
#
# Until we have a beefier self-hosted runner, this workflow is
# manual-only via workflow_dispatch. It runs the suite twice: once
# against the self-hosted LND backend, then again against the Nostr
# Wallet Connect (NWC) backend (a relay + NIP-47 wallet are layered in;
# see tests/e2e/nwc_wallet/). Locally:
#
#   docker compose --env-file .env.development up -d
#   ./tests/e2e/run.sh                      # LND backend
#   ./tests/e2e/nwc_wallet/run-nwc.sh       # NWC backend
on:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Prepare dev-data and start the stack
        run: |
          bash scripts/setup.sh
          docker compose --env-file .env.development up -d --wait || \
            docker compose --env-file .env.development up -d

      - name: Wait for the LND <-> router channel to be active
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            count=$(docker exec lnd lncli --network=regtest listchannels 2>/dev/null \
              | python -c "import json,sys; d=json.load(sys.stdin); print(sum(1 for c in d.get('channels',[]) if c.get('active')))" \
              || echo 0)
            if [ "${count:-0}" -ge 1 ]; then
              echo "Channel is active."
              exit 0
            fi
            echo "Waiting for active channel (attempt $i)..."
            sleep 5
          done
          echo "Timed out waiting for the LN channel to come up."
          docker compose --env-file .env.development logs --tail=200
          exit 1

      - name: Wait for lnemail-api health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              echo "API healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for /api/health."
          docker compose --env-file .env.development logs --tail=200 lnemail-api
          exit 1

      - name: Run Playwright e2e tests (LND backend)
        run: pytest tests/e2e -v

      - name: Switch lnemail to the NWC backend (relay + NIP-47 wallet)
        run: |
          set -euo pipefail
          BASE=docker-compose.yaml
          OVERRIDE=tests/e2e/nwc_wallet/docker-compose.e2e-nwc.yaml
          docker compose --env-file .env.development -f "$BASE" -f "$OVERRIDE" \
            build lnemail-api lnemail-worker nwc-wallet
          docker compose --env-file .env.development -f "$BASE" -f "$OVERRIDE" \
            up -d --force-recreate relay nwc-wallet lnemail-api lnemail-worker
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/api/health >/dev/null 2>&1 \
              && docker logs lnemail-api 2>&1 | grep -q "Payment backend: multi-provider"; then
              echo "API is up on the NWC backend."
              exit 0
            fi
            echo "Waiting for NWC backend (attempt $i)..."
            sleep 5
          done
          echo "Timed out waiting for the NWC backend."
          docker logs nwc-wallet --tail=100 || true
          docker logs lnemail-api --tail=100 || true
          exit 1

      - name: Run Playwright e2e tests (NWC backend)
        run: pytest tests/e2e -v

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose --env-file .env.development \
            -f docker-compose.yaml -f tests/e2e/nwc_wallet/docker-compose.e2e-nwc.yaml \
            logs --tail=400

      - name: Tear down the stack
        if: always()
        run: |
          docker compose --env-file .env.development \
            -f docker-compose.yaml -f tests/e2e/nwc_wallet/docker-compose.e2e-nwc.yaml \
            down -v --remove-orphans

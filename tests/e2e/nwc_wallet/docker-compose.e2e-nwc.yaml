# E2E override that swaps LNemail's payment backend to NWC.
#
# Usage (after the base stack is up and the LN channel is active):
#   docker compose --env-file .env.development \
#     -f docker-compose.yaml -f tests/e2e/nwc_wallet/docker-compose.e2e-nwc.yaml \
#     up -d relay nwc-wallet lnemail-api lnemail-worker
#
# It adds:
#   * relay      - an ephemeral nostr-rs-relay
#   * nwc-wallet  - a NIP-47 wallet service backed by the regtest merchant
#                   LND (creates/looks up the invoices LNemail asks for)
# and reconfigures lnemail-api / lnemail-worker to use those NWC providers
# exclusively (NWC_ONLY=true), so the e2e suite exercises the NWC path.
#
# These two test secrets are throwaway regtest keys (NOT secrets):
#   wallet pubkey is derived from WALLET_SECRET; LNemail authenticates as
#   CLIENT_SECRET. The wallet writes the client URI to /shared/nwc.uri.

x-nwc-keys: &nwc-keys
  WALLET_SECRET: "37f30b67a72719a751ab49fca3dde426199c97ecf44caca5d79dbd41d39c9d84"
  CLIENT_SECRET: "e98d6daa1f28d5a29007e1ed27cc43c8924f56c4f84d8975ad163b28d75c8446"

services:
  relay:
    image: docker.io/scsibug/nostr-rs-relay:0.10.0
    container_name: relay
    restart: unless-stopped
    volumes:
      - ./tests/e2e/nwc_wallet/relay-config.toml:/usr/src/app/config.toml:ro
    networks:
      - lnd
    expose:
      - "8080"

  nwc-wallet:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nwc-wallet
    restart: unless-stopped
    depends_on:
      - relay
      - lnd
      - lnd-setup
    environment:
      <<: *nwc-keys
      RELAY_URL: "ws://relay:8080"
      NWC_URI_FILE: "/shared/nwc.uri"
      LND_GRPC_HOST: "lnd:10009"
      LND_CERT_PATH: "/shared/tls.cert"
      LND_MACAROON_PATH: "/shared/invoice.macaroon"
    volumes:
      - ./:/app
      - ./dev-data/shared:/shared
    networks:
      - lnd
    command: >
      bash -c "
        echo 'NWC wallet: waiting for LND certs...'
        while [ ! -f /shared/tls.cert ] || [ ! -f /shared/invoice.macaroon ]; do sleep 3; done
        rm -f /shared/nwc.uri
        python tests/e2e/nwc_wallet/wallet.py
      "

  lnemail-api:
    environment:
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:////data/lnemail.db
      - MAIL_DOMAIN=lnemail.test
      - MAIL_DATA_PATH=/var/mail
      - MAIL_REQUESTS_DIR=/shared/requests
      - MAIL_RESPONSES_DIR=/shared/responses
      - LND_GRPC_HOST=lnd:10009
      - LND_CERT_PATH=/shared/tls.cert
      - LND_MACAROON_PATH=/shared/invoice.macaroon
      - EMAIL_PRICE=1000
      - REDIS_HOST=lnemail-redis
      - REDIS_PORT=6379
      - SECRET_KEY=dev_secret_key_for_local_testing_only
      - IMAP_HOST=mail.lnemail.test
      - IMAP_PORT=143
      - SMTP_HOST=mail.lnemail.test
      - SMTP_PORT=587
      - PAYMENT_BACKEND=nwc
      - NWC_ONLY=true
    depends_on:
      - lnemail-redis
      - mailserver
      - lnd
      - lnd-setup
      - nwc-wallet
    command: >
      bash -c "
        echo 'Waiting for LND certificates...'
        while [ ! -f /shared/tls.cert ] || [ ! -f /shared/invoice.macaroon ]; do sleep 5; done
        echo 'Waiting for NWC wallet URI...'
        while [ ! -s /shared/nwc.uri ]; do sleep 3; done
        export NWC_CONNECTIONS=\"$$(cat /shared/nwc.uri)\"
        echo \"Using NWC backend (NWC_ONLY) via $$NWC_CONNECTIONS\"
        alembic upgrade head
        uvicorn src.lnemail.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
      "

  lnemail-worker:
    environment:
      - DEBUG=True
      - DATABASE_URL=sqlite:////data/lnemail.db
      - MAIL_DOMAIN=lnemail.test
      - MAIL_DATA_PATH=/var/mail
      - MAIL_REQUESTS_DIR=/shared/requests
      - MAIL_RESPONSES_DIR=/shared/responses
      - LND_GRPC_HOST=lnd:10009
      - LND_CERT_PATH=/shared/tls.cert
      - LND_MACAROON_PATH=/shared/invoice.macaroon
      - EMAIL_PRICE=1000
      - REDIS_HOST=lnemail-redis
      - REDIS_PORT=6379
      - SECRET_KEY=dev_secret_key_for_local_testing_only
      - PAYMENT_BACKEND=nwc
      - NWC_ONLY=true
    depends_on:
      - lnemail-redis
      - lnd
      - lnd-setup
      - nwc-wallet
    command: >
      bash -c "
        echo 'Worker waiting for LND certificates...'
        while [ ! -f /shared/tls.cert ] || [ ! -f /shared/invoice.macaroon ]; do sleep 5; done
        echo 'Worker waiting for NWC wallet URI...'
        while [ ! -s /shared/nwc.uri ]; do sleep 3; done
        export NWC_CONNECTIONS=\"$$(cat /shared/nwc.uri)\"
        rq worker lnemail --with-scheduler
      "
